<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BildFlow Pro - منشئ التصاميم الاحترافي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5;
            --bg-dark: #0f172a; --bg-panel: #1e293b; --bg-canvas: #f1f5f9;
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --border: #334155; --shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            --success: #10b981; --error: #ef4444; --warning: #f59e0b;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow: hidden; height: 100vh; }
        
        /* الشريط العلوي */
        .top-bar { height: 60px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: relative; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; }
        .top-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s; display: flex; align-items: center; gap: 6px; font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
        .btn-secondary { background: var(--bg-dark); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); color: var(--text-primary); }
        .btn-success { background: var(--success); color: white; }
        
        /* الحاوية الرئيسية - مرنة */
        .main-container { display: flex; height: calc(100vh - 60px); position: relative; overflow: hidden; }
        
        /* الشريط الجانبي للأدوات - ثابت العرض */
        .tools-sidebar { width: 80px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 8px; flex-shrink: 0; }
        .tool-item { width: 60px; height: 60px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; color: var(--text-secondary); }
        .tool-item:hover, .tool-item.active { background: var(--primary); color: white; transform: scale(1.05); }
        .tool-item i { font-size: 24px; margin-bottom: 4px; }
        .tool-item span { font-size: 11px; }
        
        /* لوحة الأدوات - قابلة للسحب */
        .tools-panel { 
            width: 300px; 
            min-width: 200px; 
            max-width: 500px; 
            background: var(--bg-panel); 
            border-left: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto;
            position: relative;
            flex-shrink: 0;
            transition: width 0.2s ease;
        }
        
        /* مقبض السحب للوحة الأدوات */
        .resize-handle-panel {
            position: absolute;
            left: -5px;
            top: 0;
            width: 10px;
            height: 100%;
            cursor: ew-resize;
            background: transparent;
            z-index: 1000;
        }
        
        .resize-handle-panel:hover {
            background: var(--primary);
            opacity: 0.3;
        }
        
        /* لوحة الخصائص - قابلة للسحب */
        .properties-panel { 
            width: 280px; 
            min-width: 200px; 
            max-width: 450px; 
            background: var(--bg-panel); 
            border-right: 1px solid var(--border); 
            overflow-y: auto;
            position: relative;
            flex-shrink: 0;
            transition: width 0.2s ease;
        }
        
        .resize-handle-props {
            position: absolute;
            right: -5px;
            top: 0;
            width: 10px;
            height: 100%;
            cursor: ew-resize;
            background: transparent;
            z-index: 1000;
        }
        
        .resize-handle-props:hover {
            background: var(--primary);
            opacity: 0.3;
        }
        
        /* منطقة العمل - تأخذ المساحة المتبقية */
        .workspace { 
            flex: 1; 
            background: var(--bg-canvas); 
            position: relative; 
            overflow: auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            min-width: 0;
        }
        
        /* حاوية اللوحة القماشية - قابلة للتكبير */
        .canvas-container { 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            min-width: 300px;
            min-height: 200px;
        }
        
        /* اللوحة القماشية - حجمها قابل للتعديل */
        .canvas { 
            background: white; 
            position: relative; 
            overflow: hidden;
            width: 1200px;
            height: 800px;
            transition: width 0.2s, height 0.2s;
        }
        
        /* أزرار التحكم بحجم الورقة */
        .canvas-size-controls {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-panel);
            border-radius: 8px;
            padding: 5px 10px;
            display: flex;
            gap: 8px;
            z-index: 10;
            white-space: nowrap;
            box-shadow: var(--shadow);
        }
        
        .size-btn {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .size-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        .size-input {
            width: 70px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
        }
        
        /* باقي الأنماط كما هي */
        .panel-header { padding: 20px; border-bottom: 1px solid var(--border); font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .panel-content { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .section-title { font-size: 12px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 12px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .elements-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .element-item { aspect-ratio: 1; background: var(--bg-dark); border: 2px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; font-size: 28px; }
        .element-item:hover { border-color: var(--primary); transform: scale(1.05); background: var(--bg-panel); }
        .canvas-element { position: absolute; cursor: move; user-select: none; transition: box-shadow 0.2s; }
        .canvas-element.selected { outline: 2px solid var(--primary); outline-offset: 2px; z-index: 1000; }
        .resize-handles { position: absolute; width: 100%; height: 100%; pointer-events: none; display: none; }
        .canvas-element.selected .resize-handles { display: block; }
        .handle { position: absolute; width: 12px; height: 12px; background: white; border: 2px solid var(--primary); border-radius: 50%; pointer-events: all; cursor: pointer; }
        .handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
        .property-group { padding: 20px; border-bottom: 1px solid var(--border); }
        .property-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: block; }
        .property-input { width: 100%; padding: 8px 12px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 14px; }
        .color-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .color-preset { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s; }
        .color-preset:hover { transform: scale(1.2); border-color: white; }
        .hidden { display: none !important; }
        .grid-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(rgba(99,102,241,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.1) 1px, transparent 1px); background-size: 20px 20px; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        .grid-overlay.visible { opacity: 1; }
        .notification { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: var(--success); color: white; border-radius: 8px; z-index: 10000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .loading-overlay.active { display: flex; }
        .loading-spinner { width: 50px; height: 50px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .layer-controls { display: flex; gap: 8px; margin-top: 16px; }
        .layer-btn { flex: 1; padding: 8px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .layer-btn:hover { background: var(--primary); color: white; }
        .text-effects { display: flex; gap: 8px; flex-wrap: wrap; }
        .effect-btn { padding: 6px 12px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); cursor: pointer; font-size: 12px; }
        .effect-btn:hover, .effect-btn.active { background: var(--primary); color: white; }
        .template-grid { display: grid; gap: 12px; }
        .template-item { padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.3s; font-weight: 600; color: white; }
        .template-item:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .property-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .property-col { flex: 1; }
        .category-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 12px; background: var(--bg-dark); border-radius: 8px; margin-bottom: 12px; }
        .category-content { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        /* شريط تمرير مخصص */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text" style="margin-top:20px;color:white">جاري معالجة التصميم...</div>
</div>

<div class="top-bar">
    <div class="logo">
        <i class="fas fa-layer-group"></i>
        <span>BildFlow Pro</span>
    </div>
    <div style="flex: 1; text-align: center;">
        <input type="text" value="مشروع تصميم جديد" id="projectName"
            style="background: transparent; border: none; color: var(--text-primary); font-size: 16px; text-align: center; outline: none; padding: 8px; border-radius: 6px;">
    </div>
    <div class="top-actions">
        <button class="btn btn-secondary" onclick="undo()"><i class="fas fa-undo"></i> تراجع</button>
        <button class="btn btn-secondary" onclick="redo()"><i class="fas fa-redo"></i> إعادة</button>
        <button class="btn btn-secondary" onclick="toggleGrid()"><i class="fas fa-border-all"></i> شبكة</button>
        <button class="btn btn-secondary" onclick="saveProject()"><i class="fas fa-save"></i> حفظ</button>
        <button class="btn btn-primary" onclick="exportDesign()"><i class="fas fa-download"></i> تصدير PNG</button>
    </div>
</div>

<div class="main-container">
    <!-- الشريط الجانبي للأدوات -->
    <div class="tools-sidebar">
        <div class="tool-item active" onclick="switchTool('elements')" data-tool="elements"><i class="fas fa-shapes"></i><span>عناصر</span></div>
        <div class="tool-item" onclick="switchTool('text')" data-tool="text"><i class="fas fa-font"></i><span>نص</span></div>
        <div class="tool-item" onclick="switchTool('images')" data-tool="images"><i class="fas fa-image"></i><span>صور</span></div>
        <div class="tool-item" onclick="switchTool('templates')" data-tool="templates"><i class="fas fa-th-large"></i><span>قوالب</span></div>
        <div class="tool-item" onclick="switchTool('backgrounds')" data-tool="backgrounds"><i class="fas fa-palette"></i><span>خلفية</span></div>
    </div>

    <!-- لوحة الأدوات الموسعة - قابلة للسحب -->
    <div class="tools-panel" id="toolsPanel">
        <div class="resize-handle-panel" id="resizeToolsHandle"></div>
        
        <!-- عناصر -->
        <div id="panel-elements" class="panel-section">
            <div class="panel-header"><i class="fas fa-shapes"></i> العناصر</div>
            <div class="panel-content">
                <div class="elements-grid">
                    <div class="element-item" onclick="addShape('rect')"><i class="fas fa-square"></i></div>
                    <div class="element-item" onclick="addShape('circle')"><i class="fas fa-circle"></i></div>
                    <div class="element-item" onclick="addShape('rounded')"><i class="fas fa-square" style="border-radius:30%"></i></div>
                    <div class="element-item" onclick="addShape('triangle')"><i class="fas fa-play" style="transform:rotate(-90deg)"></i></div>
                    <div class="element-item" onclick="addIcon('heart')"><i class="fas fa-heart" style="color:#ef4444"></i></div>
                    <div class="element-item" onclick="addIcon('star')"><i class="fas fa-star" style="color:#f59e0b"></i></div>
                </div>
                <div class="section-title" style="margin-top:10px">📝 نصوص جاهزة</div>
                <div class="elements-grid">
                    <div class="element-item" onclick="addTextStyle('heading')" style="font-size:20px; font-weight:bold">عنوان</div>
                    <div class="element-item" onclick="addTextStyle('body')" style="font-size:16px">نص</div>
                    <div class="element-item" onclick="addText()" style="font-size:24px">+</div>
                </div>
            </div>
        </div>

        <!-- نص -->
        <div id="panel-text" class="panel-section hidden">
            <div class="panel-header"><i class="fas fa-font"></i> النصوص</div>
            <div class="panel-content">
                <button class="btn btn-primary" style="width:100%" onclick="addText()"><i class="fas fa-plus"></i> إضافة نص جديد</button>
                <div class="section-title"><i class="fas fa-font"></i> الخطوط</div>
                <select class="property-input" onchange="changeFont(this.value)">
                    <option value="Segoe UI">Segoe UI</option>
                    <option value="Arial">Arial</option>
                    <option value="Tahoma">Tahoma</option>
                </select>
            </div>
        </div>

        <!-- صور -->
        <div id="panel-images" class="panel-section hidden">
            <div class="panel-header"><i class="fas fa-image"></i> الصور</div>
            <div class="panel-content">
                <div style="border:2px dashed var(--border);border-radius:12px;padding:30px;text-align:center;cursor:pointer" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size:48px;color:var(--primary)"></i>
                    <div>انقر لرفع صورة</div>
                    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
                </div>
            </div>
        </div>

        <!-- قوالب -->
        <div id="panel-templates" class="panel-section hidden">
            <div class="panel-header"><i class="fas fa-th-large"></i> القوالب</div>
            <div class="panel-content">
                <div class="template-grid">
                    <div class="template-item" onclick="loadTemplate('social')" style="background:linear-gradient(135deg,#667eea,#764ba2)">📱 منشور وسائل تواصل</div>
                    <div class="template-item" onclick="loadTemplate('poster')" style="background:linear-gradient(135deg,#f093fb,#f5576c)">🎨 بوستر إعلاني</div>
                    <div class="template-item" onclick="loadTemplate('card')" style="background:linear-gradient(135deg,#4facfe,#00f2fe)">💳 بطاقة أعمال</div>
                </div>
            </div>
        </div>

        <!-- خلفيات -->
        <div id="panel-backgrounds" class="panel-section hidden">
            <div class="panel-header"><i class="fas fa-palette"></i> الخلفيات</div>
            <div class="panel-content">
                <div class="color-presets">
                    <div class="color-preset" style="background:#ffffff" onclick="setBackground('#ffffff')"></div>
                    <div class="color-preset" style="background:#000000" onclick="setBackground('#000000')"></div>
                    <div class="color-preset" style="background:#667eea" onclick="setBackground('#667eea')"></div>
                    <div class="color-preset" style="background:#f093fb" onclick="setBackground('#f093fb')"></div>
                </div>
                <div class="elements-grid" style="margin-top:10px">
                    <div class="element-item" style="background:linear-gradient(135deg,#667eea,#764ba2)" onclick="setBackground('linear-gradient(135deg,#667eea,#764ba2)')"></div>
                    <div class="element-item" style="background:linear-gradient(135deg,#f093fb,#f5576c)" onclick="setBackground('linear-gradient(135deg,#f093fb,#f5576c)')"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- مساحة العمل -->
    <div class="workspace" id="workspace">
        <div class="canvas-container">
            <div class="canvas" id="canvas">
                <div class="grid-overlay" id="gridOverlay"></div>
            </div>
            <!-- أزرار التحكم بحجم الورقة -->
            <div class="canvas-size-controls">
                <button class="size-btn" onclick="setCanvasSize(800,600)">📱 صغير (800×600)</button>
                <button class="size-btn" onclick="setCanvasSize(1200,800)">🖥️ متوسط (1200×800)</button>
                <button class="size-btn" onclick="setCanvasSize(1920,1080)">📺 كبير (1920×1080)</button>
                <button class="size-btn" onclick="setCanvasSize(3000,2000)">🎨 كبير جداً (3000×2000)</button>
                <button class="size-btn" onclick="fitToWorkspace()">🔍 ملاءمة للشاشة</button>
                <input type="number" id="customWidth" placeholder="العرض" class="size-input" style="width:80px">
                <input type="number" id="customHeight" placeholder="الارتفاع" class="size-input" style="width:80px">
                <button class="size-btn" onclick="setCustomSize()">تطبيق</button>
            </div>
        </div>
    </div>

    <!-- لوحة الخصائص - قابلة للسحب -->
    <div class="properties-panel" id="propertiesPanel">
        <div class="resize-handle-props" id="resizePropsHandle"></div>
        <div class="panel-header"><i class="fas fa-sliders-h"></i> الخصائص</div>
        <div class="panel-content" id="propertiesContent">
            <div style="text-align:center;color:var(--text-secondary);padding:40px">
                <i class="fas fa-mouse-pointer" style="font-size:48px;margin-bottom:15px"></i>
                <div>اختر عنصراً للتعديل</div>
            </div>
        </div>
    </div>
</div>

<script>
// ===================== المتغيرات العامة =====================
let selectedElement = null;
let elementCounter = 0;
let isDragging = false;
let currentHandle = null;
let history = [];
let historyStep = -1;
let toolsPanelWidth = 300;
let propsPanelWidth = 280;

// ===================== التحكم بحجم الألواح =====================
function initResizablePanels() {
    const toolsPanel = document.getElementById('toolsPanel');
    const propsPanel = document.getElementById('propertiesPanel');
    const toolsHandle = document.getElementById('resizeToolsHandle');
    const propsHandle = document.getElementById('resizePropsHandle');
    
    let startX, startWidth;
    
    // سحب لوحة الأدوات
    toolsHandle.addEventListener('mousedown', (e) => {
        startX = e.clientX;
        startWidth = toolsPanel.offsetWidth;
        document.addEventListener('mousemove', onToolsMouseMove);
        document.addEventListener('mouseup', onToolsMouseUp);
        e.preventDefault();
    });
    
    function onToolsMouseMove(e) {
        const dx = startX - e.clientX;
        let newWidth = startWidth + dx;
        newWidth = Math.min(500, Math.max(200, newWidth));
        toolsPanel.style.width = newWidth + 'px';
        toolsPanelWidth = newWidth;
    }
    
    function onToolsMouseUp() {
        document.removeEventListener('mousemove', onToolsMouseMove);
        document.removeEventListener('mouseup', onToolsMouseUp);
    }
    
    // سحب لوحة الخصائص
    propsHandle.addEventListener('mousedown', (e) => {
        startX = e.clientX;
        startWidth = propsPanel.offsetWidth;
        document.addEventListener('mousemove', onPropsMouseMove);
        document.addEventListener('mouseup', onPropsMouseUp);
        e.preventDefault();
    });
    
    function onPropsMouseMove(e) {
        const dx = e.clientX - startX;
        let newWidth = startWidth + dx;
        newWidth = Math.min(450, Math.max(200, newWidth));
        propsPanel.style.width = newWidth + 'px';
        propsPanelWidth = newWidth;
    }
    
    function onPropsMouseUp() {
        document.removeEventListener('mousemove', onPropsMouseMove);
        document.removeEventListener('mouseup', onPropsMouseUp);
    }
}

// ===================== التحكم بحجم الورقة =====================
function setCanvasSize(width, height) {
    const canvas = document.getElementById('canvas');
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    document.querySelector('.canvas-container').style.width = width + 'px';
    document.querySelector('.canvas-container').style.height = height + 'px';
    saveHistory();
    showNotification(`تم تغيير حجم الورقة إلى ${width}×${height}`);
}

function setCustomSize() {
    const width = parseInt(document.getElementById('customWidth').value);
    const height = parseInt(document.getElementById('customHeight').value);
    if (width > 0 && height > 0) {
        setCanvasSize(width, height);
    } else {
        showNotification('الرجاء إدخال أبعاد صحيحة', 'error');
    }
}

function fitToWorkspace() {
    const workspace = document.getElementById('workspace');
    const canvas = document.getElementById('canvas');
    const container = document.querySelector('.canvas-container');
    const workspaceRect = workspace.getBoundingClientRect();
    const canvasWidth = canvas.offsetWidth;
    const canvasHeight = canvas.offsetHeight;
    
    let scale = Math.min(
        (workspaceRect.width - 60) / canvasWidth,
        (workspaceRect.height - 80) / canvasHeight
    );
    
    scale = Math.min(scale, 1);
    container.style.transform = `scale(${scale})`;
    container.style.transformOrigin = 'center center';
    showNotification('تمت الملاءمة للشاشة');
}

// ===================== إضافة العناصر الأساسية =====================
function addShape(type) {
    const canvas = document.getElementById('canvas');
    const el = document.createElement('div');
    el.className = 'canvas-element';
    el.id = `element-${++elementCounter}`;
    const size = 100;
    el.style.left = ((canvas.offsetWidth - size) / 2) + 'px';
    el.style.top = ((canvas.offsetHeight - size) / 2) + 'px';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.background = '#6366f1';
    if (type === 'circle') el.style.borderRadius = '50%';
    else if (type === 'rounded') el.style.borderRadius = '20px';
    else if (type === 'triangle') {
        el.style.width = '0'; el.style.height = '0';
        el.style.background = 'transparent';
        el.style.borderLeft = '50px solid transparent';
        el.style.borderRight = '50px solid transparent';
        el.style.borderBottom = '100px solid #6366f1';
    }
    el.dataset.type = 'shape';
    addResizeHandles(el);
    canvas.appendChild(el);
    selectElement(el);
    saveHistory();
}

    const icons = { heart: 'fa-heart', star: 'fa-star' };
    const canvas = document.getElementById('canvas');
    const el = document.createElement('div');
    el.className = 'canvas-element';
    el.id = `element-${++elementCounter}`;

}

function addText() {
    const canvas = document.getElementById('canvas');
    const el = document.createElement('div');
    el.className = 'canvas-element';
    el.id = `element-${++elementCounter}`;
    el.innerHTML = 'اكتب هنا';

function addTextStyle(style) {
    const styles = { heading: { size: '48px', weight: 'bold', text: 'عنوان رئيسي' }, body: { size: '18px', weight: 'normal', text: 'نص عادي' } };
    const s = styles[style];
    const canvas = document.getElementById('canvas');
    const el = document.createElement('div');
    el.className = 'canvas-element';
    el.id = `element-${++elementCounter}`;
    el.innerHTML = s.text;
    el.style.cssText = `font-size:${s.size};font-weight:${s.weight};color:#0f172a;left:250px;top:280px;padding:10px;cursor:text;`;
    el.contentEditable = true;
    el.dataset.type = 'text';
    addResizeHandles(el);
    canvas.appendChild(el);
    selectElement(el);
    saveHistory();
}

function addResizeHandles(element) {
    const handles = document.createElement('div');
    handles.className = 'resize-handles';
    ['nw','ne','sw','se','n','s','e','w'].forEach(pos => {
        const h = document.createElement('div');
        h.className = `handle ${pos}`;
        h.addEventListener('mousedown', (e) => { e.stopPropagation(); startResize(e, element, pos); });
        handles.appendChild(h);
    });
    element.appendChild(handles);
    element.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('handle')) return;
        startDrag(e, element);
    });
    element.addEventListener('click', (e) => { e.stopPropagation(); selectElement(element); });
}

function startDrag(e, element) {
    if (element.contentEditable === 'true') return;
    e.preventDefault();
    let isDraggingNow = false;
    const startMouseX = e.clientX;
    const startMouseY = e.clientY;
    const startElemLeft = parseInt(element.style.left) || 0;
    const startElemTop = parseInt(element.style.top) || 0;

    function onMove(e) {
        const dx = e.clientX - startMouseX;
        const dy = e.clientY - startMouseY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDraggingNow = true;
        element.style.left = (startElemLeft + dx) + 'px';
        element.style.top = (startElemTop + dy) + 'px';
        element.classList.add('dragging');
    }

    function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        element.classList.remove('dragging');
        if (isDraggingNow) saveHistory();
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
}

function startResize(e, element, pos) {
    e.preventDefault();
    const startMouseX = e.clientX;
    const startMouseY = e.clientY;
    const startW = element.offsetWidth;
    const startH = element.offsetHeight;
    const startL = parseInt(element.style.left) || 0;
    const startT = parseInt(element.style.top) || 0;

    function onMove(e) {
        const dx = e.clientX - startMouseX;
        const dy = e.clientY - startMouseY;
        let newW = startW, newH = startH, newL = startL, newT = startT;
        if (pos.includes('e')) newW = Math.max(20, startW + dx);
        if (pos.includes('s')) newH = Math.max(20, startH + dy);
        if (pos.includes('w')) { newW = Math.max(20, startW - dx); newL = startL + (startW - newW); }
        if (pos.includes('n')) { newH = Math.max(20, startH - dy); newT = startT + (startH - newH); }
        element.style.width = newW + 'px';
        element.style.height = newH + 'px';
        element.style.left = newL + 'px';
        element.style.top = newT + 'px';
    }

    function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        saveHistory();
        updatePropertiesPanel();
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
}

function selectElement(element) {
    document.querySelectorAll('.canvas-element').forEach(el => el.classList.remove('selected'));
    if (element) {
        element.classList.add('selected');
        selectedElement = element;
        updatePropertiesPanel();
    } else {
        selectedElement = null;
        document.getElementById('propertiesContent').innerHTML = `<div style="text-align:center;color:var(--text-secondary);padding:40px"><i class="fas fa-mouse-pointer" style="font-size:48px"></i><div>اختر عنصراً للتعديل</div></div>`;
    }
}

function updatePropertiesPanel() {
    if (!selectedElement) return;
    const cs = window.getComputedStyle(selectedElement);
    let html = `
        <div class="property-group">
            <div class="section-title">📐 الحجم والموقع</div>
            <div class="property-row">
                <div class="property-col"><label class="property-label">العرض</label><input type="number" class="property-input" value="${selectedElement.offsetWidth}" onchange="selectedElement.style.width=this.value+'px';saveHistory()"></div>
                <div class="property-col"><label class="property-label">الارتفاع</label><input type="number" class="property-input" value="${selectedElement.offsetHeight}" onchange="selectedElement.style.height=this.value+'px';saveHistory()"></div>
            </div>
            <div class="property-row">
                <div class="property-col"><label class="property-label">X</label><input type="number" class="property-input" value="${parseInt(selectedElement.style.left)||0}" onchange="selectedElement.style.left=this.value+'px';saveHistory()"></div>
                <div class="property-col"><label class="property-label">Y</label><input type="number" class="property-input" value="${parseInt(selectedElement.style.top)||0}" onchange="selectedElement.style.top=this.value+'px';saveHistory()"></div>
            </div>
            <label class="property-label">الشفافية: ${Math.round((parseFloat(cs.opacity)||1)*100)}%</label>
            <input type="range" min="0" max="100" value="${Math.round((parseFloat(cs.opacity)||1)*100)}" oninput="selectedElement.style.opacity=this.value/100">
        </div>
        <div class="property-group">
            <div class="section-title">🎨 اللون</div>
            <input type="color" value="#6366f1" onchange="selectedElement.style.background=this.value;saveHistory()">
        </div>
        <div class="property-group">
            <div class="section-title">🔧 الإجراءات</div>
            <div class="layer-controls">
                <button class="layer-btn" onclick="deleteElement()" style="background:#ef4444;color:white"><i class="fas fa-trash"></i> حذف</button>
                <button class="layer-btn" onclick="duplicateElement()"><i class="fas fa-copy"></i> نسخ</button>
            </div>
        </div>`;
    document.getElementById('propertiesContent').innerHTML = html;
}

function duplicateElement() {
    if (!selectedElement) return;
    const clone = selectedElement.cloneNode(true);
    clone.id = `element-${++elementCounter}`;
    clone.style.left = (parseInt(selectedElement.style.left) + 20) + 'px';
    clone.style.top = (parseInt(selectedElement.style.top) + 20) + 'px';
    addResizeHandles(clone);
    document.getElementById('canvas').appendChild(clone);
    selectElement(clone);
    saveHistory();
    showNotification('تم نسخ العنصر');
}

function deleteElement() {
    if (!selectedElement) return;
    selectedElement.remove();
    selectedElement = null;
    updatePropertiesPanel();
    saveHistory();
}

function handleImageUpload(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const canvas = document.getElementById('canvas');
            const el = document.createElement('div');
            el.className = 'canvas-element';
            el.id = `element-${++elementCounter}`;
            el.style.cssText = 'width:300px;height:200px;left:250px;top:200px;background-size:cover;background-position:center;border-radius:8px';
            el.style.backgroundImage = `url(${e.target.result})`;
            el.dataset.type = 'image';
            addResizeHandles(el);
            canvas.appendChild(el);
            selectElement(el);
            saveHistory();
            showNotification('تم رفع الصورة');
        };
        reader.readAsDataURL(file);
    }
}

function loadTemplate(type) {
    const canvas = document.getElementById('canvas');
    canvas.querySelectorAll('.canvas-element').forEach(e => e.remove());
    if (type === 'social') setCanvasSize(1080, 1080);
    else if (type === 'poster') setCanvasSize(800, 1200);
    else setCanvasSize(900, 500);
    canvas.style.background = 'linear-gradient(135deg,#667eea,#764ba2)';
    const text = document.createElement('div');
    text.className = 'canvas-element';
    text.id = `element-${++elementCounter}`;
    text.innerHTML = type === 'social' ? 'منشور رائع!' : (type === 'poster' ? 'بوستر إعلاني' : 'بطاقة أعمال');
    text.style.cssText = 'font-size:48px;font-weight:bold;color:white;left:50%;top:50%;transform:translate(-50%,-50%);white-space:nowrap;';
    text.contentEditable = true;
    addResizeHandles(text);
    canvas.appendChild(text);
    selectElement(text);
    saveHistory();
    showNotification('تم تحميل القالب');
}

function setBackground(value) {
    document.getElementById('canvas').style.background = value;
    saveHistory();
}

function toggleGrid() {
    document.getElementById('gridOverlay').classList.toggle('visible');
}

function changeFont(font) {
    if (selectedElement) selectedElement.style.fontFamily = font;
}

function showNotification(msg, type = 'info') {
    const n = document.createElement('div');
    n.className = 'notification';
    n.innerHTML = msg;
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 2000);
}

function saveHistory() {
    const canvas = document.getElementById('canvas');
    historyStep++;
    history = history.slice(0, historyStep);
    history.push(canvas.innerHTML);
    if (history.length > 50) history.shift();
}

function undo() {
    if (historyStep <= 0) return;
    historyStep--;
    document.getElementById('canvas').innerHTML = history[historyStep];
    reattachEvents();
}

function redo() {
    if (historyStep >= history.length - 1) return;
    historyStep++;
    document.getElementById('canvas').innerHTML = history[historyStep];
    reattachEvents();
}

function reattachEvents() {
    document.querySelectorAll('.canvas-element').forEach(el => addResizeHandles(el));
    selectElement(null);
}

function saveProject() {
    const canvas = document.getElementById('canvas');
    const data = { html: canvas.innerHTML, bg: canvas.style.background, name: document.getElementById('projectName').value };
    localStorage.setItem('bildflow_project', JSON.stringify(data));
    showNotification('تم حفظ المشروع');
}

function loadLastProject() {
    const saved = localStorage.getItem('bildflow_project');
    if (saved) {
        const data = JSON.parse(saved);
        document.getElementById('canvas').innerHTML = data.html;
        document.getElementById('canvas').style.background = data.bg;
        document.getElementById('projectName').value = data.name;
        reattachEvents();
        showNotification('تم تحميل المشروع');
    }
}

function exportDesign() {
    const canvas = document.getElementById('canvas');
    const overlay = document.getElementById('loadingOverlay');
    overlay.classList.add('active');
    const handles = canvas.querySelectorAll('.resize-handles');
    handles.forEach(h => h.style.display = 'none');
    html2canvas(canvas, { scale: 2 }).then(canvasImg => {
        const link = document.createElement('a');
        link.download = 'design.png';
        link.href = canvasImg.toDataURL();
        link.click();
        handles.forEach(h => h.style.display = '');
        overlay.classList.remove('active');
        showNotification('تم التصدير!');
    }).catch(() => { overlay.classList.remove('active'); showNotification('خطأ في التصدير', 'error'); });
}

function switchTool(tool) {
    document.querySelectorAll('.tool-item').forEach(i => i.classList.remove('active'));
    document.querySelector(`[data-tool="${tool}"]`).classList.add('active');
    document.querySelectorAll('.panel-section').forEach(p => p.classList.add('hidden'));
    document.getElementById(`panel-${tool}`).classList.remove('hidden');
}

// اختصارات لوحة المفاتيح
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
    if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
    if (e.key === 'Delete' && selectedElement) deleteElement();
});

// التهيئة
initResizablePanels();
saveHistory();
showNotification('مرحباً! يمكنك سحب الألواح الجانبية لتوسيع مساحة العمل 🎨');
</script>
