<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BildFlow Pro - مثل Canva بالضبط</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg-dark: #111827;
            --bg-panel: #1f2937;
            --bg-canvas: #e5e7eb;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border: #374151;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* شريط علوي */
        .top-bar {
            height: 56px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .top-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--bg-dark);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        /* تخطيط مرن */
        .main-container {
            display: flex;
            height: calc(100vh - 56px);
            overflow: hidden;
        }

        /* شريط أدوات جانبي */
        .toolbar {
            width: 64px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            flex-shrink: 0;
        }

        .tool-btn {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            background: transparent;
            border: none;
        }

        .tool-btn:hover, .tool-btn.active {
            background: var(--primary);
            color: white;
        }

        .tool-btn i { font-size: 20px; margin-bottom: 4px; }
        .tool-btn span { font-size: 10px; }

        /* لوحة جانبية */
        .sidebar {
            width: 280px;
            min-width: 240px;
            max-width: 360px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 16px;
        }

        .sidebar-content {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        /* منطقة العمل */
        .workspace {
            flex: 1;
            background: var(--bg-canvas);
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .canvas-wrapper {
            position: relative;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            background: white;
        }

        .canvas {
            width: 1000px;
            height: 800px;
            position: relative;
            overflow: hidden;
            background: white;
        }

        /* عناصر قابلة للتحريك */
        .element {
            position: absolute;
            cursor: grab;
            user-select: none;
            transition: box-shadow 0.1s;
        }

        .element:active {
            cursor: grabbing;
        }

        .element.selected {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        /* مقابض التحجيم - مثل Canva */
        .resize-handles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
        }

        .element.selected .resize-handles {
            display: block;
        }

        .handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border: 2px solid var(--primary);
            border-radius: 50%;
            pointer-events: all;
            transition: transform 0.1s;
        }

        .handle:hover {
            transform: scale(1.3);
            background: var(--primary);
        }

        .handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
        .handle.n { top: -6px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
        .handle.s { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
        .handle.w { left: -6px; top: 50%; transform: translateY(-50%); cursor: w-resize; }
        .handle.e { right: -6px; top: 50%; transform: translateY(-50%); cursor: e-resize; }
        
        /* مقبض الدوران - مثل Canva */
        .rotate-handle {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            cursor: grab;
            pointer-events: all;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        
        .rotate-handle::before {
            content: '';
            position: absolute;
            top: 16px;
            left: 7px;
            width: 2px;
            height: 24px;
            background: var(--primary);
        }
        
        .rotate-handle:hover {
            transform: translateX(-50%) scale(1.2);
        }

        /* مؤشرات الأبعاد */
        .dimension-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        
        .element.selected .dimension-label {
            opacity: 1;
        }

        /* خطوط المحاذاة */
        .alignment-guide {
            position: absolute;
            background: var(--primary);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
        }
        
        .alignment-guide.visible {
            opacity: 0.8;
        }
        
        .guide-horizontal {
            height: 1px;
            width: 100%;
        }
        
        .guide-vertical {
            width: 1px;
            height: 100%;
        }

        /* شبكة مساعدة */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(59,130,246,0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(59,130,246,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .grid-overlay.visible { opacity: 1; }

        /* مجموعة العناصر */
        .elements-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .element-card {
            aspect-ratio: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 24px;
        }

        .element-card:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        /* لوحة الخصائص */
        .property-group {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .property-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .property-input {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .property-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .color-presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .color-preset {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .color-preset:hover {
            transform: scale(1.15);
            border-color: white;
        }

        /* إشعارات */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: var(--success);
            color: white;
            border-radius: 8px;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            font-size: 13px;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .hidden { display: none !important; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">
        <i class="fas fa-palette"></i>
        <span>BildFlow Pro</span>
    </div>
    <div>
        <input type="text" id="projectName" value="تصميم جديد" 
            style="background: transparent; border: none; color: var(--text-primary); font-size: 14px; text-align: center; padding: 6px 12px; border-radius: 6px;">
    </div>
    <div class="top-actions">
        <button class="btn btn-secondary" onclick="undo()"><i class="fas fa-undo"></i> تراجع</button>
        <button class="btn btn-secondary" onclick="redo()"><i class="fas fa-redo"></i> إعادة</button>
        <button class="btn btn-secondary" onclick="toggleGrid()"><i class="fas fa-border-all"></i> شبكة</button>
        <button class="btn btn-secondary" onclick="saveProject()"><i class="fas fa-save"></i> حفظ</button>
        <button class="btn btn-primary" onclick="exportDesign()"><i class="fas fa-download"></i> تصدير</button>
    </div>
</div>

<div class="main-container">
    <!-- شريط الأدوات الجانبي -->
    <div class="toolbar">
        <button class="tool-btn active" onclick="switchPanel('elements')" data-panel="elements">
            <i class="fas fa-shapes"></i><span>عناصر</span>
        </button>
        <button class="tool-btn" onclick="switchPanel('text')" data-panel="text">
            <i class="fas fa-font"></i><span>نص</span>
        </button>
        <button class="tool-btn" onclick="switchPanel('images')" data-panel="images">
            <i class="fas fa-image"></i><span>صور</span>
        </button>
        <button class="tool-btn" onclick="switchPanel('backgrounds')" data-panel="backgrounds">
            <i class="fas fa-palette"></i><span>خلفية</span>
        </button>
        <button class="tool-btn" onclick="switchPanel('templates')" data-panel="templates">
            <i class="fas fa-th-large"></i><span>قوالب</span>
        </button>
        <button class="tool-btn" onclick="switchPanel('size')" data-panel="size">
            <i class="fas fa-expand"></i><span>حجم</span>
        </button>
    </div>

    <!-- اللوحة الجانبية -->
    <div class="sidebar" id="sidebar">
        <!-- لوحة العناصر -->
        <div id="panel-elements" class="panel-content">
            <div class="sidebar-header"><i class="fas fa-shapes"></i> العناصر</div>
            <div class="sidebar-content">
                <div class="elements-grid">
                    <div class="element-card" onclick="addShape('rect')"><i class="fas fa-square" style="color:#3b82f6; font-size:32px"></i></div>
                    <div class="element-card" onclick="addShape('circle')"><i class="fas fa-circle" style="color:#3b82f6; font-size:32px"></i></div>
                    <div class="element-card" onclick="addShape('rounded')"><i class="fas fa-square" style="color:#3b82f6; border-radius:25%"></i></div>
                    <div class="element-card" onclick="addShape('triangle')"><i class="fas fa-play" style="color:#3b82f6; transform:rotate(-90deg)"></i></div>
                    <div class="element-card" onclick="addIcon('heart')"><i class="fas fa-heart" style="color:#ef4444"></i></div>
                    <div class="element-card" onclick="addIcon('star')"><i class="fas fa-star" style="color:#f59e0b"></i></div>
                </div>
            </div>
        </div>

        <!-- لوحة النصوص -->
        <div id="panel-text" class="panel-content hidden">
            <div class="sidebar-header"><i class="fas fa-font"></i> النصوص</div>
            <div class="sidebar-content">
                <button class="btn btn-primary" style="width:100%; margin-bottom: 16px;" onclick="addText()"><i class="fas fa-plus"></i> إضافة نص</button>
                <div class="elements-grid" style="grid-template-columns: repeat(2, 1fr);">
                    <div class="element-card" onclick="addTextStyle('heading')" style="font-size:20px; font-weight:bold">عنوان</div>
                    <div class="element-card" onclick="addTextStyle('subheading')" style="font-size:16px; font-weight:600">عنوان فرعي</div>
                    <div class="element-card" onclick="addTextStyle('body')" style="font-size:14px">نص عادي</div>
                </div>
            </div>
        </div>

        <!-- لوحة الصور -->
        <div id="panel-images" class="panel-content hidden">
            <div class="sidebar-header"><i class="fas fa-image"></i> الصور</div>
            <div class="sidebar-content">
                <div style="border: 2px dashed var(--border); border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 16px;"
                    onclick="document.getElementById('imageUpload').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: var(--primary); margin-bottom: 10px; display: block;"></i>
                    <div style="font-size: 14px;">انقر لرفع صورة</div>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="uploadImage(event)">
                </div>
            </div>
        </div>

        <!-- لوحة الخلفيات -->
        <div id="panel-backgrounds" class="panel-content hidden">
            <div class="sidebar-header"><i class="fas fa-palette"></i> الخلفيات</div>
            <div class="sidebar-content">
                <div class="color-presets">
                    <div class="color-preset" style="background:#ffffff" onclick="setBg('#ffffff')"></div>
                    <div class="color-preset" style="background:#000000" onclick="setBg('#000000')"></div>
                    <div class="color-preset" style="background:#3b82f6" onclick="setBg('#3b82f6')"></div>
                    <div class="color-preset" style="background:#ef4444" onclick="setBg('#ef4444')"></div>
                    <div class="color-preset" style="background:#10b981" onclick="setBg('#10b981')"></div>
                    <div class="color-preset" style="background:#f59e0b" onclick="setBg('#f59e0b')"></div>
                </div>
                <div class="elements-grid" style="margin-top: 16px;">
                    <div class="element-card" style="background:linear-gradient(135deg,#667eea,#764ba2)" onclick="setBg('linear-gradient(135deg,#667eea,#764ba2)')"></div>
                    <div class="element-card" style="background:linear-gradient(135deg,#f093fb,#f5576c)" onclick="setBg('linear-gradient(135deg,#f093fb,#f5576c)')"></div>
                </div>
            </div>
        </div>

        <!-- لوحة القوالب -->
        <div id="panel-templates" class="panel-content hidden">
            <div class="sidebar-header"><i class="fas fa-th-large"></i> قوالب جاهزة</div>
            <div class="sidebar-content">
                <div class="element-card" style="background:linear-gradient(135deg,#667eea,#764ba2); margin-bottom: 10px; padding: 16px;" onclick="loadTemplate('social')">
                    <i class="fas fa-share-alt" style="font-size: 32px;"></i>
                    <div>منشور وسائل تواصل</div>
                </div>
                <div class="element-card" style="background:linear-gradient(135deg,#f093fb,#f5576c); margin-bottom: 10px; padding: 16px;" onclick="loadTemplate('poster')">
                    <i class="fas fa-file-image" style="font-size: 32px;"></i>
                    <div>بوستر إعلاني</div>
                </div>
            </div>
        </div>

        <!-- لوحة حجم الورقة -->
        <div id="panel-size" class="panel-content hidden">
            <div class="sidebar-header"><i class="fas fa-expand"></i> حجم الورقة</div>
            <div class="sidebar-content">
                <div class="elements-grid" style="grid-template-columns: repeat(2, 1fr);">
                    <div class="element-card" style="padding: 12px;" onclick="setCanvasSize(800,600)">800×600</div>
                    <div class="element-card" style="padding: 12px;" onclick="setCanvasSize(1080,1080)">1080×1080</div>
                    <div class="element-card" style="padding: 12px;" onclick="setCanvasSize(1920,1080)">1920×1080</div>
                </div>
            </div>
        </div>
    </div>

    <!-- منطقة العمل -->
    <div class="workspace" id="workspace">
        <div class="canvas-wrapper">
            <div class="canvas" id="canvas">
                <div class="grid-overlay" id="gridOverlay"></div>
            </div>
        </div>
    </div>

    <!-- لوحة الخصائص -->
    <div class="sidebar" style="border-left: none; border-right: 1px solid var(--border);">
        <div class="sidebar-header"><i class="fas fa-sliders-h"></i> الخصائص</div>
        <div class="sidebar-content" id="properties">
            <div style="text-align: center; color: var(--text-secondary); padding: 40px;">
                <i class="fas fa-mouse-pointer" style="font-size: 48px; margin-bottom: 12px;"></i>
                <div>اختر عنصراً للتعديل</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ===================== المتغيرات =====================
    let selectedElement = null;
    let elementId = 0;
    let history = [];
    let historyIndex = -1;
    let isDragging = false;
    let isResizing = false;
    let isRotating = false;
    let resizeHandle = null;
    let dragStart = { x: 0, y: 0, left: 0, top: 0 };
    let resizeStart = { x: 0, y: 0, width: 0, height: 0, left: 0, top: 0, angle: 0 };
    let snapToGrid = false;
    let gridSize = 20;

    // ===================== التهيئة =====================
    function init() {
        saveHistory();
        showNotification('مرحباً بك! تحكم مثل Canva 🎨');
    }

    // ===================== تبديل اللوحات =====================
    function switchPanel(panel) {
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-panel="${panel}"]`).classList.add('active');
        document.querySelectorAll('.panel-content').forEach(p => p.classList.add('hidden'));
        document.getElementById(`panel-${panel}`).classList.remove('hidden');
    }

    // ===================== إضافة عناصر =====================
    function addShape(type) {
        const canvas = document.getElementById('canvas');
        const el = document.createElement('div');
        el.className = 'element';
        el.id = `el_${++elementId}`;
        const size = 120;
        el.style.left = (canvas.offsetWidth / 2 - size / 2) + 'px';
        el.style.top = (canvas.offsetHeight / 2 - size / 2) + 'px';
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.background = '#3b82f6';
        
        if (type === 'circle') el.style.borderRadius = '50%';
        else if (type === 'rounded') el.style.borderRadius = '20px';
        else if (type === 'triangle') {
            el.style.width = '0';
            el.style.height = '0';
            el.style.background = 'transparent';
            el.style.borderLeft = '60px solid transparent';
            el.style.borderRight = '60px solid transparent';
            el.style.borderBottom = '120px solid #3b82f6';
        }
        
        el.dataset.type = 'shape';
        addHandlesAndRotate(el);
        canvas.appendChild(el);
        selectElement(el);
        saveHistory();
        showNotification('تمت إضافة الشكل');
    }

    function addIcon(type) {
        const icons = { heart: 'fa-heart', star: 'fa-star' };
        const colors = { heart: '#ef4444', star: '#f59e0b' };
        const canvas = document.getElementById('canvas');
        const el = document.createElement('div');
        el.className = 'element';
        el.id = `el_${++elementId}`;
        el.innerHTML = `<i class="fas ${icons[type]}" style="font-size: 56px; color: ${colors[type] || '#3b82f6'}"></i>`;
        el.style.left = (canvas.offsetWidth / 2 - 40) + 'px';
        el.style.top = (canvas.offsetHeight / 2 - 40) + 'px';
        el.dataset.type = 'icon';
        addHandlesAndRotate(el);
        canvas.appendChild(el);
        selectElement(el);
        saveHistory();
    }

    function addText() {
        const canvas = document.getElementById('canvas');
        const el = document.createElement('div');
        el.className = 'element';
        el.id = `el_${++elementId}`;
        el.innerHTML = 'اضغط للتحرير';
        el.style.cssText = 'font-size: 32px; color: #111827; font-family: Segoe UI; left: 300px; top: 280px; padding: 8px; min-width: 150px; cursor: text;';
        el.contentEditable = true;
        el.dataset.type = 'text';
        addHandlesAndRotate(el);
        canvas.appendChild(el);
        selectElement(el);
        saveHistory();
    }

    function addTextStyle(style) {
        const canvas = document.getElementById('canvas');
        const el = document.createElement('div');
        el.className = 'element';
        el.id = `el_${++elementId}`;
        const styles = {
            heading: { size: '42px', weight: 'bold', text: 'عنوان رئيسي' },
            subheading: { size: '28px', weight: '600', text: 'عنوان فرعي' },
            body: { size: '18px', weight: 'normal', text: 'نص عادي' }
        };
        const s = styles[style];
        el.innerHTML = s.text;
        el.style.cssText = `font-size: ${s.size}; font-weight: ${s.weight}; color: #111827; font-family: Segoe UI; left: 250px; top: 280px; padding: 8px; min-width: 150px; cursor: text;`;
        el.contentEditable = true;
        el.dataset.type = 'text';
        addHandlesAndRotate(el);
        canvas.appendChild(el);
        selectElement(el);
        saveHistory();
    }

    function uploadImage(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const canvas = document.getElementById('canvas');
            const el = document.createElement('div');
            el.className = 'element';
            el.id = `el_${++elementId}`;
            el.style.cssText = `width: 300px; height: 200px; left: 250px; top: 200px; background-size: cover; background-position: center; border-radius: 8px;`;
            el.style.backgroundImage = `url(${ev.target.result})`;
            el.dataset.type = 'image';
            addHandlesAndRotate(el);
            canvas.appendChild(el);
            selectElement(el);
            saveHistory();
            showNotification('تم رفع الصورة');
        };
        reader.readAsDataURL(file);
        e.target.value = '';
    }

    // ===================== مقابض التحجيم والدوران (مثل Canva) =====================
    function addHandlesAndRotate(el) {
        // مقابض التحجيم
        const handles = document.createElement('div');
        handles.className = 'resize-handles';
        ['nw', 'ne', 'sw', 'se', 'n', 's', 'e', 'w'].forEach(pos => {
            const h = document.createElement('div');
            h.className = `handle ${pos}`;
            h.onmousedown = (e) => startResize(e, el, pos);
            handles.appendChild(h);
        });
        el.appendChild(handles);
        
        // مقبض الدوران
        const rotateHandle = document.createElement('div');
        rotateHandle.className = 'rotate-handle';
        rotateHandle.onmousedown = (e) => startRotate(e, el);
        el.appendChild(rotateHandle);
        
        // مؤشر الأبعاد
        const dimLabel = document.createElement('div');
        dimLabel.className = 'dimension-label';
        el.appendChild(dimLabel);
        
        // أحداث العنصر
        el.onmousedown = (e) => {
            if (e.target.classList.contains('handle') || e.target.classList.contains('rotate-handle')) return;
            startDrag(e, el);
        };
        el.ondblclick = (e) => {
            if (el.dataset.type === 'text') {
                el.contentEditable = true;
                el.focus();
            }
        };
        el.onblur = () => {
            if (el.dataset.type === 'text') {
                el.contentEditable = false;
                saveHistory();
            }
        };
        el.onclick = (e) => { e.stopPropagation(); selectElement(el); };
    }

    // ===================== السحب =====================
    function startDrag(e, el) {
        if (el.contentEditable === 'true') return;
        e.preventDefault();
        isDragging = true;
        selectedElement = el;
        dragStart = {
            x: e.clientX,
            y: e.clientY,
            left: parseInt(el.style.left) || 0,
            top: parseInt(el.style.top) || 0
        };
        document.onmousemove = onDrag;
        document.onmouseup = stopDrag;
    }

    function onDrag(e) {
        if (!isDragging || !selectedElement) return;
        let dx = e.clientX - dragStart.x;
        let dy = e.clientY - dragStart.y;
        let newLeft = dragStart.left + dx;
        let newTop = dragStart.top + dy;
        
        // التقاط للشبكة
        if (snapToGrid) {
            newLeft = Math.round(newLeft / gridSize) * gridSize;
            newTop = Math.round(newTop / gridSize) * gridSize;
        }
        
        selectedElement.style.left = newLeft + 'px';
        selectedElement.style.top = newTop + 'px';
        
        // إظهار خطوط المحاذاة
        showAlignmentGuides(selectedElement);
    }

    function stopDrag() {
        isDragging = false;
        document.onmousemove = null;
        document.onmouseup = null;
        if (selectedElement) {
            saveHistory();
            updateProperties();
        }
        clearAlignmentGuides();
    }
